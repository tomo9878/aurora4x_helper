name: Auto Release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create zip archive
        run: |
          zip -r aurora4x_tools.zip \
            aurora_reader.py \
            aurora_minerals.py \
            aurora_reader.bat \
            aurora_reader_en.bat \
            README.md \
            extras/

      - name: Delete existing latest release/tag
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        run: |
          git tag latest
          git push origin latest
          gh release create latest \
            --title "Latest Build" \
            --notes "master への push 時に自動生成されたリリースです。" \
            aurora4x_tools.zip \
            aurora_reader.py \
            aurora_minerals.py \
            aurora_reader.bat \
            aurora_reader_en.bat
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
